host: localhost:8080
info:
  contact: {}
  description: Psych Core API
  title: Psych Core API
  version: "1.0"
paths:
  /chat:
    get:
      responses: {}
  /config/create:
    post:
      consumes:
      - application/json
      description: Initialize or create service configurations (Chat, TTS, Report)
        for a unit.
      parameters:
      - description: Configuration details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/core_api.ConfigCreateOrUpdateReq'
      produces:
      - application/json
      responses:
        "200":
          description: Status response
          schema:
            $ref: '#/definitions/basic.Response'
      security:
      - ApiKeyAuth: []
      summary: Create Config (创建配置)
      tags:
      - Config
  /config/get_by_unit_id:
    get:
      consumes:
      - application/json
      description: Retrieve service configurations for a specific Unit ID.
      parameters:
      - description: Unit ID
        in: query
        name: unitId
        required: true
        type: string
      - description: Whether to return sensitive admin-only fields (e.g., AppIDs)
        in: query
        name: admin
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: Configuration details
          schema:
            $ref: '#/definitions/core_api.ConfigGetByUnitIdResp'
      security:
      - ApiKeyAuth: []
      summary: Get Config (获取配置)
      tags:
      - Config
  /config/update_info:
    post:
      consumes:
      - application/json
      description: Update existing service configurations for a unit. Admin only.
      parameters:
      - description: Configuration fields to update
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/core_api.ConfigCreateOrUpdateReq'
      produces:
      - application/json
      responses:
        "200":
          description: Status response
          schema:
            $ref: '#/definitions/basic.Response'
      security:
      - ApiKeyAuth: []
      summary: Update Config (更新配置)
      tags:
      - Config
  /conversation/create:
    post:
      responses: {}
  /conversation/get:
    post:
      responses: {}
  /conversation/list:
    post:
      responses: {}
  /dashboard/alarm_overview:
    post:
      consumes:
      - application/json
      description: Get statistical overview of alarm management (high risk, processed,
        pending).
      parameters:
      - description: Unit ID to filter
        in: query
        name: unitId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Alarm statistics overview
          schema:
            $ref: '#/definitions/core_api.DashboardGetAlarmOverviewResp'
        "400":
          description: Missing or invalid Unit ID
          schema:
            type: string
      security:
      - ApiKeyAuth: []
      summary: Alarm Overview (预警概览)
      tags:
      - Dashboard
  /dashboard/alarm_records:
    post:
      consumes:
      - application/json
      description: List psychological alarm records with filtering by emotion, status,
        and keywords.
      parameters:
      - description: Filtering and pagination options
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/core_api.DashboardListAlarmRecordsReq'
      produces:
      - application/json
      responses:
        "200":
          description: Paginated alarm records
          schema:
            $ref: '#/definitions/core_api.DashboardListAlarmRecordsResp'
        "400":
          description: Invalid request body
          schema:
            type: string
      security:
      - ApiKeyAuth: []
      summary: List Alarm Records (预警记录列表)
      tags:
      - Dashboard
  /dashboard/classes:
    post:
      consumes:
      - application/json
      description: List classes within a unit along with user and alarm counts.
      parameters:
      - description: Unit ID
        in: query
        name: unitId
        required: true
        type: string
      - description: Grade filter
        in: query
        name: grade
        type: integer
      - description: Class filter
        in: query
        name: class
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Hierarchical grade/class statistics
          schema:
            $ref: '#/definitions/core_api.DashboardListClassesResp'
        "400":
          description: Invalid parameters
          schema:
            type: string
      security:
      - ApiKeyAuth: []
      summary: List Classes (班级列表)
      tags:
      - Dashboard
  /dashboard/conversation_records:
    post:
      consumes:
      - application/json
      description: Get detailed conversation records for a specific user, including
        trends and details.
      parameters:
      - description: User ID and pagination
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/core_api.DashboardUserConvRecordsReq'
      produces:
      - application/json
      responses:
        "200":
          description: Conversation history and analysis
          schema:
            $ref: '#/definitions/core_api.DashboardUserConvRecordsResp'
      security:
      - ApiKeyAuth: []
      summary: User Conversation Records (用户对话记录)
      tags:
      - Dashboard
  /dashboard/get_report:
    post:
      consumes:
      - application/json
      description: Retrieve a detailed psychological analysis report for a specific
        conversation.
      parameters:
      - description: Conversation ID
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/core_api.DashboardGetReportReq'
      produces:
      - application/json
      responses:
        "200":
          description: Detailed report content
          schema:
            $ref: '#/definitions/core_api.DashboardGetReportResp'
      security:
      - ApiKeyAuth: []
      summary: Get Report (获取心理报告)
      tags:
      - Dashboard
  /dashboard/overview:
    post:
      consumes:
      - application/json
      description: Get overall dashboard statistics, including total units, users,
        active users, and conversation counts. Supports period comparison.
      parameters:
      - description: Specific Unit ID to filter. If empty, returns global admin view
          (if authorized).
        in: query
        name: unitId
        type: string
      produces:
      - application/json
      responses:
        "200":
