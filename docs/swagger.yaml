host: localhost:8080
info:
  contact: {}
  description: Psych Core API
  title: Psych Core API
  version: "1.0"
paths:
  /chat:
    get:
      responses: {}
  /config/create:
    post:
      consumes:
      - application/json
      description: 创建或初始化单位配置
      parameters:
      - description: Config Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/core_api.ConfigCreateOrUpdateReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/basic.Response'
        "400":
          description: Bad Request
          schema:
            type: string
      summary: Create Config (创建配置)
      tags:
      - Config
  /config/get_by_unit_id:
    get:
      consumes:
      - application/json
      description: 根据 Unit ID 获取配置详情
      parameters:
      - description: Unit ID
        in: query
        name: unitId
        required: true
        type: string
      - description: Is Admin
        in: query
        name: admin
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/core_api.ConfigGetByUnitIdResp'
        "400":
          description: Bad Request
          schema:
            type: string
      summary: Get Config (获取配置)
      tags:
      - Config
  /config/update_info:
    post:
      consumes:
      - application/json
      description: 更新单位的配置信息（如Chat/TTS/Report配置）
      parameters:
